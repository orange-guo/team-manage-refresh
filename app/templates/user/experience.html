<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>激活free</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Sora:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/user.css">
    <style>
        .active-list-wrap {
            margin-top: 18px;
            border: 1px solid rgba(148, 163, 184, 0.25);
            border-radius: 12px;
            overflow: hidden;
            background: rgba(2, 6, 23, 0.35);
        }
        .active-list-header,
        .active-list-row {
            display: grid;
            grid-template-columns: 1.8fr 1.2fr 0.8fr;
            gap: 10px;
            padding: 10px 14px;
            align-items: center;
            font-size: 14px;
        }
        .active-list-header {
            font-weight: 600;
            color: #cbd5e1;
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
            background: rgba(30, 41, 59, 0.35);
        }
        .active-list-row {
            border-bottom: 1px solid rgba(148, 163, 184, 0.12);
            color: #e2e8f0;
        }
        .active-list-row:last-child {
            border-bottom: none;
        }
        .active-countdown {
            font-family: 'Sora', sans-serif;
            color: #fbbf24;
            font-weight: 600;
        }
        .active-empty {
            margin-top: 10px;
            color: #94a3b8;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="bg-scene">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    <div class="grid-overlay"></div>

    <div class="page-wrap">
        <div class="container full-layout">
            <header class="hero-header">
                <span class="logo-badge">EXPERIENCE</span>
                <h1>激活free</h1>
                <p class="hero-subtitle">提交邮箱号自动拉入team池，跳过add phone，十分钟激活时间，到期自动移除，请立即Oauth登录导入cpa！</p>
                <div class="spots-badge welfare-spots-badge">
                    <i class="fa-solid fa-users"></i>
                    当前可用席位：<span class="seats-count" id="remainingSpots">{{ remaining_spots }}</span>
                </div>
            </header>

            <main class="main-shell">
                <section class="tab-panel active" style="display:block;">
                    <div class="panel-head">
                        <h2>提交体验邮箱</h2>
                        <p>规则：单个账号总席位 5（可拉入 4 个）；满位会自动切换下一个账号；全满会提示等待。</p>
                    </div>

                    <form id="experienceForm" class="stack-form" autocomplete="off">
                        <div class="form-group">
                            <label for="email">邮箱地址 <span class="required-star">*</span></label>
                            <div class="field-wrap">
                                <i class="fa-solid fa-envelope field-icon"></i>
                                <input id="email" name="email" type="email" required placeholder="your@email.com" class="form-input">
                            </div>
                            <p class="field-hint">系统将向这个邮箱发出 Team 邀请。</p>
                        </div>

                        <button id="submitBtn" type="submit" class="btn btn-primary">
                            <i class="fa-solid fa-paper-plane"></i>
                            提交并拉入
                        </button>
                    </form>

                    <div class="info-box" style="margin-top:16px;">
                        <i class="fa-solid fa-circle-info info-icon"></i>
                        <div>
                            <div>拉入成功后，下方会立即显示 10:00 倒计时提示。</div>
                            <div>倒计时结束后系统自动踢出（最多约 1 分钟内完成）。</div>
                        </div>
                    </div>

                    <div id="resultBox" class="warning-box" style="display:none; margin-top: 18px;">
                        <i id="resultIcon" class="fa-solid fa-circle-info"></i>
                        <div>
                            <div id="resultMessage" style="font-weight:600;"></div>
                            <div id="teamInfo" style="margin-top:6px; opacity:.92;"></div>
                            <div id="countdown" style="margin-top:8px; font-family: 'Sora', sans-serif; font-size: 18px;"></div>
                        </div>
                    </div>

                    <div class="panel-head" style="margin-top:22px;">
                        <h2>已加入邮箱（公开）</h2>
                        <p>下方实时显示当前已加入邮箱与剩余倒计时。</p>
                    </div>
                    <div class="active-list-wrap" id="activeListWrap" style="display:none;">
                        <div class="active-list-header">
                            <span>邮箱</span>
                            <span>所在账号</span>
                            <span>倒计时</span>
                        </div>
                        <div id="activeListRows"></div>
                    </div>
                    <div id="activeListEmpty" class="active-empty">当前暂无已加入邮箱</div>
                </section>
            </main>
        </div>
    </div>

    <script src="/static/js/experience.js"></script>
</body>
</html>
